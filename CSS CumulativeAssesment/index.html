        <!--this is the javascript for the carousel that holds a for loop to loop though an index and in turn loops through images to display an image as block-->
        <script>
            var myIndexLeft = 0;
            var myIndexRight = 0;
            carouselLeft();
            carouselRight();
            function carouselLeft() {
                var i;
                var x = document.getElementsByClassName("mySlidesLeft");
                for (i = 0; i < x.length; i++) {
                    x[i].style.display = "none";
                }
                myIndexLeft++;
                if (myIndexLeft > x.length) { myIndexLeft = 1 }
                x[myIndexLeft - 1].style.display = "block";
                setTimeout(carouselLeft, 3000); // changes image every 3 seconds
            }
            function carouselRight() {
                var i;
                var x = document.getElementsByClassName("mySlidesRight");
                for (i = 0; i < x.length; i++) {
                    x[i].style.display = "none";
                }
                myIndexRight++;
                if (myIndexRight > x.length) { myIndexRight = 1 }
                x[myIndexRight - 1].style.display = "block";
                setTimeout(carouselRight, 3000); // changes image every 3 seconds
            }
        </script>
